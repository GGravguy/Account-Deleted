<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Account Deleted</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #1a1a1a, #000);
        color: white;
    }

    .card {
        width: 360px;
        padding: 30px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        text-align: center;
        animation: popIn 0.5s ease-out;
    }

    @keyframes popIn {
        from {
            transform: scale(0.9);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .icon {
        font-size: 50px;
        margin-bottom: 10px;
    }

    h1 {
        font-size: 24px;
        margin-bottom: 10px;
        color: #ff4d4d;
    }

    p {
        font-size: 14px;
        opacity: 0.8;
        margin-bottom: 20px;
        line-height: 1.4;
    }

    button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        background: #ff4d4d;
        color: white;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s ease;
    }

    button:hover {
        background: #ff1f1f;
        transform: scale(1.05);
    }
</style>
</head>

<body>

<div class="card">
    <div class="icon">⚠️</div>
    <h1>Account Deleted</h1>
    <p>
        Your account has been removed due to a violation of community rules and guidelines.
        If you didn't do anything, this will be fixed.
    </p>

    <button onclick="closePage()">Close</button>
</div>

<script>
function closePage() {
    window.location.href = "about:blank";
}
</script>

</body>
</html>
